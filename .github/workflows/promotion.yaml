name: Promote Image Between Environments

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source environment"
        required: true
        type: choice
        options:
          - dev
          - staging
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod

jobs:
  promote:
    runs-on: ubuntu-latest

    environment: ${{ inputs.target_env }}

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Clone GitOps repository
        run: |
          git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/leopincle/gitops-helm-argocd.git

      - name: Extract image tag from source environment
        run: |
          cd gitops-helm-argocd/helm/ci-cd-app
          TAG=$(grep "tag:" values-${{ inputs.source_env }}.yaml | awk '{print $2}')
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Validate promotion flow
        run: |
          if [[ "${{ inputs.source_env }}" == "dev" && "${{ inputs.target_env }}" == "prod" ]]; then
            echo "Cannot promote directly from dev to prod"
            exit 1
          fi

      - name: Promote image to target environment
        run: |
          cd gitops-helm-argocd/helm/ci-cd-app
          sed -i "s/tag:.*/tag: \"${IMAGE_TAG}\"/" values-${{ inputs.target_env }}.yaml

      - name: Commit & push changes
        run: |
          cd gitops-helm-argocd
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping..."
          else
            git commit -m "feat(promotion): promote ${IMAGE_TAG} from ${{ inputs.source_env }} to ${{ inputs.target_env }}"
            git push
          fi